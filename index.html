<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scene Adventure Prototype</title>
<style>
  :root {
    --bg: #1f2937;
    --panel: rgba(17, 24, 39, 0.88);
    --grass1: #2f9e44;
    --grass2: #237a35;
    --text: #f9fafb;
    --accent: #f59e0b;
    --danger: #ef4444;
    --good: #22c55e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: var(--text);
    background: linear-gradient(180deg, #0f172a, #111827 55%, #0b1220);
    display: grid;
    place-items: center;
    padding: 16px;
  }
  .game {
    width: min(900px, 100%);
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }
  .hud {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-wrap: wrap;
  }
  .stat {
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .scene-name {
    color: #cbd5e1;
    font-size: 14px;
  }
  .viewport {
    position: relative;
    height: 420px;
    background: #3b82f6;
    overflow: hidden;
  }
  .grass {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.12), transparent 25%),
      linear-gradient(90deg, var(--grass1) 0 50%, var(--grass2) 50% 100%);
    background-size: 100% 100%, 80px 80px;
    filter: saturate(1.1);
  }
  .path {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 56px;
    height: 34px;
    background: linear-gradient(90deg, #b45309, #d97706, #b45309);
    opacity: 0.6;
  }
  .marker {
    position: absolute;
    left: 52%;
    top: 24px;
    transform: translateX(-50%);
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.75);
    border: 1px solid rgba(255,255,255,0.12);
    color: #e2e8f0;
    font-size: 14px;
  }
  .player, .enemy, .chest {
    position: absolute;
  }
  .player {
    width: 44px;
    height: 58px;
    left: 120px;
    bottom: 72px;
    border-radius: 12px 12px 10px 10px;
    background: linear-gradient(180deg, #fde68a 0 18px, #3b82f6 18px 100%);
    border: 3px solid rgba(0,0,0,0.25);
    box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    transition: transform 0.4s ease, left 0.4s ease, bottom 0.4s ease;
  }
  .player::before {
    content: '';
    position: absolute;
    inset: 6px 11px auto;
    height: 8px;
    border-radius: 50%;
    background: #111827;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.08);
  }
  .player.walking { transform: translateY(-2px) scale(1.02); }
  .chest {
    width: 100px;
    height: 100px;
    right: 70px;
    bottom: 80px;
    background: radial-gradient(circle at 35px 35px, #fef3c7 0 10px, #f59e0b 11px 100%);
    border: 4px solid rgba(0,0,0,0.25);
    border-radius: 18px;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }
  .enemy {
    width: 84px;
    height: 84px;
    right: 85px;
    bottom: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 30px 28px, #fecaca 0 10px, #dc2626 11px 100%);
    border: 4px solid rgba(0,0,0,0.3);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 34px;
  }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding: 14px 16px 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
  }
  button {
    border: 0;
    padding: 12px 16px;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    color: white;
    background: linear-gradient(180deg, #2563eb, #1d4ed8);
    box-shadow: 0 8px 18px rgba(0,0,0,0.25);
  }
  button.secondary { background: linear-gradient(180deg, #475569, #334155); }
  button.warning { background: linear-gradient(180deg, #f59e0b, #d97706); }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .log {
    min-height: 74px;
    padding: 12px 16px 16px;
    color: #e5e7eb;
    line-height: 1.4;
  }
  .badge {
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="game">
    <div class="hud">
      <div class="stat">Gold: <span id="gold">0</span></div>
      <div class="stat">XP: <span id="xp">0</span></div>
      <div class="scene-name">Scene: <span id="sceneName">Grass Field</span> <span class="badge" id="sceneType">safe</span></div>
    </div>

    <div class="viewport">
      <div class="grass"></div>
      <div class="path"></div>
      <div class="marker" id="marker">Click Next Scene to move forward</div>
      <div class="player" id="player"></div>
      <div class="chest" id="chest">🧰</div>
      <div class="enemy" id="enemy">👾</div>
    </div>

    <div class="log" id="log">You are standing on grass.</div>

    <div class="controls">
      <button id="nextBtn">Next Scene</button>
      <button class="secondary" id="openChestBtn" disabled>Open Chest</button>
      <button class="warning" id="fightBtn" disabled>Fight Enemy</button>
      <button class="secondary" id="resetBtn">Reset</button>
    </div>
  </div>

<script>
  const scenes = [
    { name: 'Grass Field', type: 'safe', event: 'none' },
    { name: 'Forest Edge', type: 'chest', event: 'chest' },
    { name: 'Dark Path', type: 'enemy', event: 'enemy' },
    { name: 'Meadow', type: 'safe', event: 'none' }
  ];

  const el = id => document.getElementById(id);
  const goldEl = el('gold');
  const xpEl = el('xp');
  const sceneNameEl = el('sceneName');
  const sceneTypeEl = el('sceneType');
  const logEl = el('log');
  const playerEl = el('player');
  const chestEl = el('chest');
  const enemyEl = el('enemy');
  const nextBtn = el('nextBtn');
  const openChestBtn = el('openChestBtn');
  const fightBtn = el('fightBtn');
  const resetBtn = el('resetBtn');
  const markerEl = el('marker');

  let sceneIndex = 0;
  let gold = 0;
  let xp = 0;
  let chestOpened = false;
  let enemyDefeated = false;

  function updateHUD() {
    const scene = scenes[sceneIndex];
    goldEl.textContent = gold;
    xpEl.textContent = xp;
    sceneNameEl.textContent = scene.name;
    sceneTypeEl.textContent = scene.type;
    sceneTypeEl.style.background = scene.type === 'enemy' ? 'rgba(239,68,68,0.25)' : scene.type === 'chest' ? 'rgba(245,158,11,0.25)' : 'rgba(34,197,94,0.25)';
    sceneTypeEl.style.color = '#fff';

    chestEl.style.display = scene.event === 'chest' ? 'flex' : 'none';
    enemyEl.style.display = scene.event === 'enemy' ? 'flex' : 'none';

    openChestBtn.disabled = !(scene.event === 'chest' && !chestOpened);
    fightBtn.disabled = !(scene.event === 'enemy' && !enemyDefeated);
    nextBtn.disabled = false;

    markerEl.textContent = scene.event === 'none'
      ? 'This scene is calm.'
      : scene.event === 'chest'
        ? 'A treasure chest is here.'
        : 'An enemy appeared here.';
  }

  function movePlayerToScene() {
    playerEl.classList.add('walking');
    playerEl.style.left = `${120 + sceneIndex * 150}px`;
    setTimeout(() => playerEl.classList.remove('walking'), 400);
  }

  function goNextScene() {
    sceneIndex = (sceneIndex + 1) % scenes.length;
    chestOpened = false;
    enemyDefeated = false;
    movePlayerToScene();
    updateHUD();
    const scene = scenes[sceneIndex];
    if (scene.event === 'none') {
      logEl.textContent = `You entered ${scene.name}. Nothing happens yet.`;
    } else if (scene.event === 'chest') {
      logEl.textContent = `You entered ${scene.name}. A chest is waiting.`;
    } else {
      logEl.textContent = `You entered ${scene.name}. An enemy is here!`;
    }
  }

  function openChest() {
    if (chestOpened) return;
    chestOpened = true;
    const lootGold = 10 + Math.floor(Math.random() * 16);
    const lootXp = 3 + Math.floor(Math.random() * 8);
    gold += lootGold;
    xp += lootXp;
    logEl.textContent = `You opened the chest and found ${lootGold} gold and ${lootXp} XP!`;
    updateHUD();
  }

  function fightEnemy() {
    if (enemyDefeated) return;
    enemyDefeated = true;
    const rewardGold = 8 + Math.floor(Math.random() * 12);
    const rewardXp = 5 + Math.floor(Math.random() * 10);
    gold += rewardGold;
    xp += rewardXp;
    logEl.textContent = `You defeated the enemy and earned ${rewardGold} gold and ${rewardXp} XP!`;
    updateHUD();
  }

  function resetGame() {
    sceneIndex = 0;
    gold = 0;
    xp = 0;
    chestOpened = false;
    enemyDefeated = false;
    playerEl.style.left = '120px';
    logEl.textContent = 'You are standing on grass.';
    updateHUD();
  }

  nextBtn.addEventListener('click', goNextScene);
  openChestBtn.addEventListener('click', openChest);
  fightBtn.addEventListener('click', fightEnemy);
  resetBtn.addEventListener('click', resetGame);

  updateHUD();
</script>
</body>
</html>
